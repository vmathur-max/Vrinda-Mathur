  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

" x2=\"19\" y2=\"7\"><\u002Fline><\u002Fsymbol>\n    <symbol id=\"ic-globe\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20\"><\u002Fpath><path d=\"M2 12h20\"><\u002Fpath><\u002Fsymbol>\n  <\u002Fdefs><\u002Fsvg>\n\n  <!-- LEFT: funnel -->\n  <div style=\"width:1120px;flex:0 0 auto;display:flex;flex-direction:column;align-items:center;\">\n    <div style=\"{{ progStyle }}\">{{ progress }}<\u002Fdiv>\n\n    <!-- sources -->\n    <div style=\"display:flex;gap:18px;justify-content:center;margin-top:22px;\">\n      <div style=\"{{ srcStyle }}\"><div style=\"{{ srcIcon }}\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\"><use href=\"#ic-mail\"><\u002Fuse><\u002Fsvg><\u002Fdiv>Gmail<\u002Fdiv>\n      <div style=\"{{ srcStyle }}\"><div style=\"{{ srcIcon }}\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\"><use href=\"#ic-drive\"><\u002Fuse><\u002Fsvg><\u002Fdiv>Shared drives<\u002Fdiv>\n      <div style=\"{{ srcStyle }}\"><div style=\"{{ srcIcon }}\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\"><use href=\"#ic-db\"><\u002Fuse><\u002Fsvg><\u002Fdiv>CRM<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"{{ arrowStyle }}\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\"><use href=\"#ic-arrow\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n\n    <!-- engine -->\n    <div style=\"{{ engineStyle }}\">\n      <div style=\"display:flex;align-items:center;gap:15px;\">\n        <div style=\"flex:0 0 auto;width:44px;height:44px;border-radius:12px;background:#0062FF;color:#fff;display:flex;align-items:center;justify-content:center;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\"><use href=\"#ic-spark\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div style=\"font-size:20px;font-weight:700;letter-spacing:-.01em;color:#161616;\">Claude Cowork — runs the <span style=\"color:#0A57D6;\">asc606-memo<\u002Fspan> skill<\u002Fdiv>\n          <div style=\"font-size:14px;color:#8A857B;margin-top:2px;\">Sweeps, matches, and drafts — same logic every run<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-top:16px;\">\n        <span style=\"font-size:12.5px;font-weight:600;color:#5C6B86;background:#EEF2FA;border:1px solid #DEE7F5;padding:6px 12px;border-radius:8px;\">5-step ASC 606 framework<\u002Fspan>\n        <span style=\"font-size:12.5px;font-weight:600;color:#5C6B86;background:#EEF2FA;border:1px solid #DEE7F5;padding:6px 12px;border-radius:8px;\">source authority hierarchy<\u002Fspan>\n        <span style=\"font-size:12.5px;font-weight:600;color:#5C6B86;background:#EEF2FA;border:1px solid #DEE7F5;padding:6px 12px;border-radius:8px;\">standard memo format<\u002Fspan>\n        <span style=\"font-size:12.5px;font-weight:600;color:#5C6B86;background:#EEF2FA;border:1px solid #DEE7F5;padding:6px 12px;border-radius:8px;\">flags open items · never invents terms<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- fan -->\n    <div style=\"{{ fanStyle }}\">\n      <svg width=\"1120\" height=\"46\" viewBox=\"0 0 1120 46\" style=\"display:block;\">\n        <path d=\"M560 0 C560 26 180 16 180 46\" fill=\"none\" stroke=\"#15A05A\" stroke-width=\"2.5\" stroke-dasharray=\"2 7\" stroke-linecap=\"round\" style=\"animation:flowDash 1s linear infinite;\"><\u002Fpath>\n        <path d=\"M560 0 L560 46\" fill=\"none\" stroke=\"#D9930A\" stroke-width=\"2.5\" stroke-dasharray=\"2 7\" stroke-linecap=\"round\" style=\"animation:flowDash 1s linear infinite;\"><\u002Fpath>\n        <path d=\"M560 0 C560 26 940 16 940 46\" fill=\"none\" stroke=\"#E5484D\" stroke-width=\"2.5\" stroke-dasharray=\"2 7\" stroke-linecap=\"round\" style=\"animation:flowDash 1s linear infinite;\"><\u002Fpath>\n      <\u002Fsvg>\n    <\u002Fdiv>\n\n    <!-- tiers -->\n    <div style=\"display:flex;gap:18px;width:1120px;\">\n      <div style=\"{{ tierGreen }}\">\n        <div style=\"display:flex;align-items:center;gap:11px;\"><div style=\"flex:0 0 auto;width:34px;height:34px;border-radius:9px;background:#E3F4EA;color:#0F7C45;display:flex;align-items:center;justify-content:center;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\"><use href=\"#ic-check\"><\u002Fuse><\u002Fsvg><\u002Fdiv><div style=\"font-size:17px;font-weight:700;color:#0F7C45;\">Standard<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#7C776E;line-height:1.45;margin-top:11px;\">Skill drafts the memo, files to SharePoint, updates the tracker.<\u002Fdiv>\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.02em;color:#0F7C45;background:#E3F4EA;padding:6px 11px;border-radius:7px;margin-top:13px;align-self:flex-start;\">drafted, ready for sign-off<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"{{ tierAmber }}\">\n        <div style=\"display:flex;align-items:center;gap:11px;\"><div style=\"flex:0 0 auto;width:34px;height:34px;border-radius:9px;background:#FBF0DA;color:#9C6A05;display:flex;align-items:center;justify-content:center;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\"><use href=\"#ic-flag\"><\u002Fuse><\u002Fsvg><\u002Fdiv><div style=\"font-size:17px;font-weight:700;color:#9C6A05;\">Medium<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#7C776E;line-height:1.45;margin-top:11px;\">Drafted with inline review flags on the judgment calls.<\u002Fdiv>\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.02em;color:#9C6A05;background:#FBF0DA;padding:6px 11px;border-radius:7px;margin-top:13px;align-self:flex-start;\">needs accountant review<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"{{ tierRed }}\">\n        <div style=\"display:flex;align-items:center;gap:11px;\"><div style=\"flex:0 0 auto;width:34px;height:34px;border-radius:9px;background:#FCE7E8;color:#C0353A;display:flex;align-items:center;justify-content:center;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\"><use href=\"#ic-alert\"><\u002Fuse><\u002Fsvg><\u002Fdiv><div style=\"font-size:17px;font-weight:700;color:#C0353A;\">Priority<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#7C776E;line-height:1.45;margin-top:11px;\">Over materiality or non-standard terms; key terms highlighted, emailed to the accountant.<\u002Fdiv>\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.02em;color:#C0353A;background:#FCE7E8;padding:6px 11px;border-radius:7px;margin-top:13px;align-self:flex-start;\">review now<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- legend -->\n    <div style=\"{{ legendStyle }}\">\n      <span style=\"display:inline-flex;align-items:center;gap:7px;\"><span style=\"width:10px;height:10px;border-radius:50%;background:#15A05A;\"><\u002Fspan>drafted / ready<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:7px;\"><span style=\"width:10px;height:10px;border-radius:50%;background:#D9930A;\"><\u002Fspan>needs review<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:7px;\"><span style=\"width:10px;height:10px;border-radius:50%;background:#E5484D;\"><\u002Fspan>priority<\u002Fspan>\n      <span style=\"width:1px;height:14px;background:#DAD6CC;\"><\u002Fspan>\n      <span style=\"color:#9A948A;\">colour = priority &amp; review status — every tier ends at a human<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- nightly -->\n    <div style=\"{{ nightlyStyle }}\">\n      <div style=\"{{ nightlyIcon }}\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\"><use href=\"#ic-radar\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n      <div style=\"flex:1;min-width:0;\">\n        <div style=\"{{ nightlyTitle }}\">Nightly check<\u002Fdiv>\n        <div style=\"font-size:14px;color:#8A857B;margin-top:2px;\">New contracts get caught immediately — the backlog never rebuilds<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"{{ nightlyTag }}\">Python script<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- web app -->\n    <sc-if value=\"{{ showWeb }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"{{ webStyle }}\">\n        <div style=\"flex:0 0 auto;width:44px;height:44px;border-radius:12px;background:#0062FF;color:#fff;display:flex;align-items:center;justify-content:center;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\"><use href=\"#ic-globe\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n        <div style=\"flex:1;min-width:0;\">\n          <div style=\"font-size:18px;font-weight:700;color:#161616;\">Where this goes next — an internal web app<\u002Fdiv>\n          <div style=\"font-size:14px;color:#8A857B;margin-top:2px;\">Host the skill on our servers so the whole team drafts &amp; reviews, self-serve<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:12.5px;font-weight:600;color:#0A57D6;background:#E8F0FE;padding:7px 13px;border-radius:9px;white-space:nowrap;\">Claude-hosted<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- RIGHT: detail panel -->\n  <div style=\"width:402px;flex:0 0 auto;background:#fff;border:1px solid #ECEAE3;border-radius:20px;box-shadow:0 18px 50px -22px rgba(40,36,28,.22);padding:42px 36px;display:flex;flex-direction:column;align-self:stretch;max-height:1076px;\">\n    <div style=\"font-size:12px;font-weight:700;letter-spacing:.16em;color:#B7B1A6;\">{{ d.label }}<\u002Fdiv>\n    <div style=\"font-size:31px;font-weight:700;letter-spacing:-.025em;line-height:1.1;color:#161616;margin-top:14px;\">{{ d.title }}<\u002Fdiv>\n    <div style=\"{{ pillStyle }}\">{{ d.pill }}<\u002Fdiv>\n    <div style=\"font-size:16.5px;line-height:1.62;color:#54504A;margin-top:24px;\">{{ d.body }}<\u002Fdiv>\n    <div style=\"flex:1;min-height:24px;\"><\u002Fdiv>\n    <div style=\"height:1px;background:#ECEAE3;margin:0 0 20px;\"><\u002Fdiv>\n    <div style=\"{{ noteLabelStyle }}\">{{ d.noteLabel }}<\u002Fdiv>\n    <div style=\"font-size:15px;line-height:1.55;color:#6A655D;margin-top:8px;\">{{ d.note }}<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { beat: 0 };\n  componentDidMount(){\n    this._k = (e) => {\n      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Spacebar' || e.code === 'Space') { e.preventDefault(); this.adv(); }\n      else if (e.key === 'ArrowLeft') { e.preventDefault(); this.back(); }\n    };\n    window.addEventListener('keydown', this._k);\n  }\n  componentWillUnmount(){ window.removeEventListener('keydown', this._k); }\n  adv(){ this.setState(s => ({ beat: Math.min(6, s.beat + 1) })); }\n  back(){ this.setState(s => ({ beat: Math.max(0, s.beat - 1) })); }\n\n  renderVals(){\n    const beat = this.state.beat;\n\n    const PANELS = [\n      { label:'PART 2A · THE BACKLOG', title:'Two problems, in order', pill:'Contract → Revenue',\n        body:'For any signed contract, someone should be able to ask — where is the ASC 606 memo? — and get a clear answer. Today contracts live across email, drives, and the CRM, and some already recognize revenue with no memo behind them.',\n        noteLabel:'THE PLAN', note:'Clean up the contracts already on the books, and make sure new ones never get into that state.' },\n      { label:'STEP 1 · THE STANDARDIZED LOGIC', title:'One shared asset', pill:'asc606-memo skill',\n        body:'The skill encodes our ASC 606 approach — the five-step framework, the source hierarchy from the Codification down to the Big 4 guides, and the standard memo format. Standardize the logic once and every memo is consistent, no matter who runs it.',\n        noteLabel:'GUARDRAIL', note:'It never invents contract terms and flags every judgment call. What it produces is always a draft for a human — never a final answer.' },\n      { label:'STEP 2 · DISCOVER', title:'Find everything first', pill:'Claude Cowork',\n        body:'Cowork sweeps the three places contracts actually live — email, shared drives, and the CRM — and in the same pass pulls any memos that already exist.',\n        noteLabel:'WHY IT MATTERS', note:'You can\\u2019t triage what you haven\\u2019t found.' },\n      { label:'STEP 3 · MATCH', title:'Find the gap', pill:'Cowork',\n        body:'It compares the contracts against the memos. The gap between those two lists is the real problem — live contracts, possibly already recognizing revenue, with nothing documented behind them.',\n        noteLabel:'THE GAP', note:'Uncovered live contracts are the actual work — everything downstream sorts them.' },\n      { label:'STEP 4 · TRIAGE', title:'Sort, then draft', pill:'asc606-memo skill',\n        body:'Every uncovered contract gets sorted, and Cowork calls the skill to draft a memo for each. Treatment differs by tier; a shared tracker is colour-coded so the whole picture is visible at a glance.',\n        noteLabel:'THE CONTROL', note:'Colour is priority, not \\u201cdone.\\u201d Every single tier still ends at a human signing off.' },\n      { label:'STEP 5 · HAND OFF', title:'The backlog never rebuilds', pill:'Nightly reconciliation',\n        body:'Once the backlog is documented, the nightly reconciliation takes over. New contracts get caught immediately, so the backlog never rebuilds.',\n        noteLabel:'ONCE, NOT FOREVER', note:'You clean up once instead of playing catch-up forever.' },\n      { label:'STEP 6 · WHERE THIS GOES', title:'Host it for the team', pill:'Claude-hosted web app',\n        body:'Because the skill is reusable, the natural next step is to host it as a small internal web app on our own servers — so anyone on the team can draft and review from the same framework, self-serve.',\n        noteLabel:'CENTRALIZED', note:'The logic stays centralized and versioned; the access opens up.' },\n    ];\n    const d = PANELS[beat];\n\n    // progress\n    const progStyle = {\n      display:'inline-flex', alignItems:'center', padding:'9px 20px', borderRadius:'999px',\n      background:'#fff', border:'1px solid #ECEAE3', fontSize:'13px', fontWeight:'700', letterSpacing:'.12em',\n      color:'#9A948A', boxShadow:'0 1px 2px rgba(40,36,28,.04)',\n    };\n    const progress = beat === 0 ? 'PRESS \\u2192 OR CLICK TO BEGIN' : '0' + beat + ' / 06';\n\n    // helper to build a reveal/active style on top of a base\n    const wrap = (base, revealAt, active, accent, glow) => {\n      const o = { ...base };\n      const revealed = beat >= revealAt;\n      o.opacity = revealed ? (active ? '1' : '.86') : '.16';\n      o.transition = 'opacity .5s ease, border-color .5s ease, box-shadow .5s ease, transform .5s cubic-bezier(.34,1.1,.5,1)';\n      if (active) {\n        o.borderColor = accent;\n        o.borderWidth = '2px';\n        o.boxShadow = '0 16px 36px -12px ' + glow;\n        o.transform = 'translateY(-3px)';\n      }\n      return o;\n    };\n\n    // source chip\n    const chipBase = {\n      display:'flex', alignItems:'center', gap:'10px', padding:'14px 22px', borderRadius:'12px',\n      background:'#fff', border:'1px solid #ECEAE3', fontSize:'15.5px', fontWeight:'650', color:'#3A3630',\n      boxShadow:'0 1px 2px rgba(40,36,28,.04)',\n    };\n    const srcStyle = wrap(chipBase, 2, beat === 2, '#0062FF', 'rgba(0,98,255,.22)');\n    const srcIcon = { flex:'0 0 auto', width:'30px', height:'30px', borderRadius:'8px', background:'#F1EFE9', color:'#6B6B6B', display:'flex', alignItems:'center', justifyContent:'center' };\n\n    const arrowStyle = {\n      color:'#C3BEB3', margin:'12px 0', display:'flex', justifyContent:'center',\n      opacity: beat >= 2 ? '1' : '.16', transition:'opacity .5s ease',\n    };\n\n    // engine\n    const engineBase = {\n      width:'680px', background:'#fff', border:'1px solid #ECEAE3', borderRadius:'18px', padding:'24px 28px',\n      boxShadow:'0 1px 2px rgba(40,36,28,.04)',\n    };\n    const engineStyle = wrap(engineBase, 1, beat === 1 || beat === 3, '#0062FF', 'rgba(0,98,255,.22)');\n\n    // fan\n    const fanStyle = { width:'1120px', margin:'10px 0 4px', opacity: beat >= 4 ? '1' : '.12', transition:'opacity .5s ease' };\n\n    // tiers\n    const tierBase = {\n      flex:'1 1 0', minWidth:'0', background:'#fff', border:'1px solid #ECEAE3', borderRadius:'16px',\n      padding:'18px 20px 20px', display:'flex', flexDirection:'column', boxShadow:'0 1px 2px rgba(40,36,28,.04)',\n    };\n    const tierGreen = wrap(tierBase, 4, beat === 4, '#15A05A', 'rgba(21,160,90,.2)');\n    const tierAmber = wrap(tierBase, 4, beat === 4, '#D9930A', 'rgba(217,147,10,.2)');\n    const tierRed   = wrap(tierBase, 4, beat === 4, '#E5484D', 'rgba(229,72,77,.2)');\n\n    // legend\n    const legendStyle = {\n      display:'flex', alignItems:'center', gap:'20px', flexWrap:'wrap', marginTop:'16px',\n      fontSize:'13px', fontWeight:'600', color:'#6A655D',\n      opacity: beat >= 4 ? '1' : '.16', transition:'opacity .5s ease',\n    };\n\n    // nightly\n    const nOn = beat === 5;\n    const nightlyBase = {\n      display:'flex', alignItems:'center', gap:'16px', width:'1120px', height:'76px', padding:'0 24px',\n      borderRadius:'14px', background:'#fff', border:'1px solid #ECEAE3', marginTop:'18px',\n      boxShadow:'0 1px 2px rgba(40,36,28,.04)',\n    };\n    const nightlyStyle = { ...nightlyBase,\n      opacity: beat >= 5 ? '1' : '.16',\n      borderColor: nOn ? '#15A05A' : '#ECEAE3',\n      borderWidth: nOn ? '2px' : '1px',\n      boxShadow: nOn ? '0 16px 36px -12px rgba(21,160,90,.3)' : '0 1px 2px rgba(40,36,28,.04)',\n      animation: nOn ? 'netPulse2 1.6s ease-out 1' : 'none',\n      transition:'opacity .5s ease, border-color .5s ease, box-shadow .5s ease',\n    };\n    const nightlyIcon = { flex:'0 0 auto', width:'42px', height:'42px', borderRadius:'50%',\n      background: nOn ? '#15A05A' : '#F1EFE9', color: nOn ? '#fff' : '#A9A398',\n      display:'flex', alignItems:'center', justifyContent:'center', transition:'background .5s ease, color .5s ease' };\n    const nightlyTitle = { fontSize:'17px', fontWeight:'700', color: nOn ? '#0F7C45' : '#2D2D2D' };\n    const nightlyTag = { fontSize:'12.5px', fontWeight:'600', padding:'7px 13px', borderRadius:'9px', whiteSpace:'nowrap',\n      background: nOn ? '#E3F4EA' : '#F4F2EC', color: nOn ? '#0F7C45' : '#A39E94', transition:'all .5s ease' };\n\n    // web app\n    const showWeb = beat >= 6;\n    const webStyle = {\n      display:'flex', alignItems:'center', gap:'16px', width:'1120px', padding:'18px 24px', marginTop:'18px',\n      borderRadius:'16px', background:'#fff', border:'2px solid #0062FF',\n      boxShadow:'0 16px 36px -12px rgba(0,98,255,.22)', animation:'webIn .55s cubic-bezier(.34,1.1,.5,1) both',\n    };\n\n    // panel pieces\n    const pillStyle = {\n      display:'inline-flex', alignSelf:'flex-start', alignItems:'center', marginTop:'18px',\n      fontSize:'13px', fontWeight:'700', letterSpacing:'.01em', padding:'7px 14px', borderRadius:'9px',\n      background:'#E8F0FE', color:'#0A57D6',\n    };\n    const noteLabelStyle = { fontSize:'11.5px', fontWeight:'700', letterSpacing:'.14em', color:'#A39E94' };\n\n    return {\n      onClick: () => this.adv(),\n      d, progress, progStyle,\n      srcStyle, srcIcon, arrowStyle, engineStyle, fanStyle,\n      tierGreen, tierAmber, tierRed, legendStyle,\n      nightlyStyle, nightlyIcon, nightlyTitle, nightlyTag,\n      showWeb, webStyle, pillStyle, noteLabelStyle,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
